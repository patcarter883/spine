spine:
  checkpoint_path: .spine/spine.db
  interpreter_enabled: true
  guided_decoding: true
  topic_lookup_min_similarity: 0.45
  # RAG configuration
  embedding_provider: local-embeddings
  recall_k: 3
  vector_indexing:
    max_concurrent_chunks: 10
    batch_size: 100
    summarize_temperature: 0.3
    embed_temperature: 0.1
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
    env:
      PROJECT_ROOT: /home/pat/projects/spine
providers:
  llm:
  - name: glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-flash
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-flash
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-pro
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-pro
    enabled: true
    guided_decoding: false

  - name: laguna-m1
    type: deepagents-model
    model: openrouter:poolside/laguna-m.1:free
    enabled: true
    guided_decoding: true

  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:poolside/laguna-xs.2:free
    enabled: true
    guided_decoding: true

  - name: gemini-3.5-flash
    type: deepagents-model
    model: openrouter:google/gemini-3.5-flash
    enabled: true
    guided_decoding: true

  - name: local
    type: deepagents-model
    model: openai:Qwen3.6-35B-A3B-MTP-GGUF
    base_url: http://localhost:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
  - name: pat
    type: deepagents-model
    model: openai:model
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
  - name: tiny
    type: deepagents-model
    model: openai:Bonsai-8B-gguf
    base_url: http://localhost:8000/v1
    api_key: vllm
    stream_usage: true
  # Embedding providers
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: Qwen3-Embedding-8B-GGUF
    base_url: http://localhost:8000/v1
    api_key: vllm
    stream_usage: true
  phases:
    specify:
      provider: pat
    plan:
      provider: pat
    critic:
      provider: local
    exploration:
      provider: local
    implement:
      provider: local
    implement/subagents/slice-implementer:
      provider: pat
    verify:
      provider: pat
    gap_plan:
      provider: local
    # RAG phase providers
    classification:
      provider: local
    summarization:
      provider: local