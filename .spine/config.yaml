spine:
  checkpoint_path: .spine/spine.db
  interpreter_enabled: true

providers:
  llm:
  - name: glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
  - name: qwen3.6-35b
    type: deepagents-model
    model: openrouter:qwen/qwen3.6-35b-a3b
    enabled: true
  - name: deepseek-v4-flash
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-flash
    enabled: true
  - name: laguna-m1
    type: deepagents-model
    model: openrouter:poolside/laguna-m.1:free
    enabled: true
  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:poolside/laguna-xs.2:free
    enabled: true
  - name: local
    type: deepagents-model
    model: openai:model
    base_url: 'http://localhost:8000/v1'
    api_key: 'vllm'
    enabled: true
  
  phases:
    # Heavy reasoning → frontier model (via reference)
    specify:
      provider: glm
    plan:
      provider: glm

    # Implementation → local vLLM, but colder temperature for code
    implement:
      provider: qwen3.6-35b
      temperature: 0.6           # freezes just the temp override

    # Slice implementer subagent gets the same vLLM but even faster
    implement/subagents/slice-implementer:
      provider: deepseek-v4-flash

    # Verification → local vLLM model with custom endpoint
    verify:
      provider: qwen3.6-35b              # short timeout for verify