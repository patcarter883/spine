spine:
  checkpoint_path: .spine/spine.db
  guided_decoding: true
  topic_lookup_min_similarity: 0.75
  synthesize_findings_token_budget: 20000
  max_completion_tokens: 30000
  researcher_supervisor_max_completion_tokens: 4096
  max_critic_retries: 3
  reranker_provider: bge-reranker
  embedding_provider: local-embeddings
  recall_k: 10
  topic_lookup_top_k: 5
  index_tests: false
  rrf_vector_weight: 0.2
  rrf_bm25_weight: 1.0
  vector_indexing:
    max_concurrent_chunks: 2
    batch_size: 100
  convergence:
    researcher_supervisor_max_cycles_specify: 12
    researcher_supervisor_max_cycles_plan: 6
  token_compaction:
    enabled: true
    default_threshold: 0
    thresholds:
      specify: 30000
      plan: 30000
      implement: 30000
      verify: 30000
    keep_recent: 6
    preserved_tools:
    - write_file
    - edit_file
    - read_edit_lint
    - write_specification
    - write_plan
    - write_tasks
    - write_verification_report
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
providers:
  llm:
  # - name: openrouter
  #   type: deepagents-model
  #   model: openrouter:poolside/laguna-xs.2:free
  #   enabled: true
  #   guided_decoding: true
  # - name: pat
  #   type: deepagents-model
  #   model: openai:model
  #   base_url: http://10.50.1.51:8000/v1
  #   api_key: vllm
  #   guided_decoding: true
  #   enabled: true
  #   stream_usage: true
  #   max_concurrent_calls: 8
  #   context_window: 60000
  - name: local
    type: deepagents-model
    model: openai:Qwen3.6-35B-A3B-MTP-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: Qwen3-Embedding-0.6B-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    stream_usage: true
    query_prefix: 'search_query: '
    document_prefix: 'search_document: '
  reranker:
  - name: bge-reranker
    model: bge-reranker-v2-m3-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    rerank_path: /reranking
  phases:
    specify:
      provider: local
      # Declare the model's real context window so the synthesizer runs under
      # the window-aware budget ledger (synthesis_budget): it clamps the synth
      # completion to synthesize_max_completion_tokens and compresses evidence
      # if it ever exceeds the window. Without this the synth runs "legacy"
      # (no clamp, fixed evidence budgets). poolside/laguna-xs.2 = 262144.
      context_window: 262144
    specify/subagents/researcher:
      provider: local
    plan:
      provider: local
      context_window: 262144
    plan/subagents/researcher:
      provider: local
    implement:
      provider: local
    verify:
      provider: local
    critic:
      provider: local
    gap_plan:
      provider: local
    classification:
      provider: local
      max_completion_tokens: 1024
      temperature: 0
      reasoning: false
    summarization:
      provider: local
      max_completion_tokens: 1024
      temperature: 0
      reasoning: false
    onboarding:
      provider: local
