spine:
  checkpoint_path: .spine/spine.db
  guided_decoding: true
  # ── smallcode-inspired small-model adaptations ────────────────────────
  # Recover tool calls a local model emits as text (<tool_call>…</tool_call>,
  # fenced JSON, bare object) instead of native tool_calls. Deterministic.
  tool_call_normalize: true
  # Append a one-line LLM fix hint to failed `execute` results. Routed to a
  # cheap local model via phases.error_diagnosis below (no remote calls).
  error_diagnosis: true
  # Per-model behavioural defaults, applied UNDER explicit provider/phase
  # settings (provider/phase values always win). context_window here is a
  # backstop for any provider that omits it; tool_format documents the call
  # style the normalizer should expect for these Hermes-template GGUFs.
  model_profiles:
    openai:Qwen3-Coder-30B-A3B-Instruct-GGUF:
      tool_format: hermes
      context_window: 60000
    openai:GLM-4.7-Flash-GGUF:
      tool_format: hermes
      context_window: 60000
  topic_lookup_min_similarity: 0.75
  synthesize_findings_token_budget: 20000
  max_completion_tokens: 30000
  researcher_supervisor_max_completion_tokens: 4096
  # 3->5: GLM planner converges but addresses critic feedback incrementally —
  # trace 019efcc1 was one retry short of PASS (attempt 3: "covers the majority,
  # one gap left"). Give it room to finish converging.
  max_critic_retries: 5
  reranker_provider: bge-reranker
  embedding_provider: local-embeddings
  recall_k: 10
  topic_lookup_top_k: 5
  index_tests: false
  # ── Last round of work: all features enabled ──────────────────────────
  # No-tool IMPLEMENT editor: synthesize complete edits, place them
  # deterministically via ReadEditLintTool (lint = oracle). Routes pending
  # slices to synthesis_implementer instead of the tool-using slice_implementer.
  # variants=3: synthesize 3 candidates, keep the one that applies+lints cleanest.
  implement_synthesis_placement: true
  implement_synthesis_variants: 1
  # No-tool VERIFY judge: pre-compute the evidence (worktree diff + target
  # source + a single py_compile/ruff pass) and have the slice-verifier emit a
  # VerificationResult in ONE shot, no tools. Replaces the ReAct verifier whose
  # unbounded read/run_checks loop spiralled to 2.75M tokens / 0 verdicts even
  # on the qwen-coder lane (trace 019f16cf) — the spiral was structural, not
  # model. Kill the loop, not just cap it.
  verify_evidence_then_judge: true
  # PLAN best-of-N (Graph-of-Thoughts Score+KeepBest): synthesize 3 candidate
  # plans, score each with the structural scorer (rejects the duplicate-path
  # explosion / unschedulable plans), keep the best before the critic sees it.
  research_synth_variants: 3
  research_synth_scorer: structural
  # Findings aggregation: consolidate findings before synthesis to shrink the
  # synthesizer prompt (mitigates read-spiral / context blowup).
  research_aggregate_merge: true
  research_aggregate_min_findings: 8
  # Lifted PLAN-synthesis completion cap (8K->16K) so larger plans don't
  # truncate the forced write_structured_plan call mid-arguments.
  plan_synthesize_max_completion_tokens: 16384
  rrf_vector_weight: 0.2
  rrf_bm25_weight: 1.0
  vector_indexing:
    max_concurrent_chunks: 2
    batch_size: 100
  convergence:
    researcher_supervisor_max_cycles_specify: 12
    researcher_supervisor_max_cycles_plan: 6
  token_compaction:
    enabled: true
    default_threshold: 0
    thresholds:
      specify: 30000
      plan: 30000
      implement: 30000
      verify: 30000
    keep_recent: 6
    preserved_tools:
    - write_file
    - edit_file
    - read_edit_lint
    - write_specification
    - write_plan
    - write_tasks
    - write_verification_report
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
providers:
  llm:
  - name: openrouter-glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.2
    enabled: true
  # - name: pat
  #   type: deepagents-model
  #   model: openai:model
  #   base_url: http://10.50.1.51:8100/v1
  #   api_key: vllm
  #   guided_decoding: true
  #   enabled: true
  #   stream_usage: true
  #   max_concurrent_calls: 2
  #   context_window: 32000
  - name: local-glm
    type: deepagents-model
    model: openai:GLM-4.7-Flash-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: pat-glm
    type: deepagents-model
    model: openai:QuantTrio/GLM-4.7-Flash-AWQ
    base_url: http://localhost:1919/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2  # Lemonade @ localhost:8010 is single-stream
    context_window: 40000
  - name: local-qwen
    type: deepagents-model
    model: openai:Qwen3.6-35B-A3B-MTP-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
    # Qwen-Coder model-card sampling: curbs the repeated-survey / re-read loops
    # a tool-using agent falls into (trace 019ef2ae: one file read 89×).
    # repeat_penalty is the key anti-loop lever (llama.cpp's native name —
    # confirmed accepted by this server; vLLM's "repetition_penalty" is also
    # supported by _build_local_model for portability). top_k/repeat_penalty
    # ride extra_body to the server (no ChatOpenAI field); top_p/temperature
    # are native — see _build_local_model.
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  - name: local-north-code
    type: deepagents-model
    model: openai:North-Mini-Code-1.0-GGUF-UD-Q4_K_XL
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: local-qwen-coder
    type: deepagents-model
    model: openai:Qwen3-Coder-30B-A3B-Instruct-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
    # Anti-loop sampling (matches the local code models for fair comparison).
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  - name: local-mellum
    type: deepagents-model
    model: openai:Mellum2-12B-A2.5B-Instruct-GGUF-Q4_K_M-Q4_K_M
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: laguna
    type: deepagents-model
    model: openai:/root/.cache/huggingface/Laguna-XS.2-RXF
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
    # Anti-loop sampling (matches the local code models for fair comparison).
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  # Reasoning lane (PLAN synthesis, critic): bench winner — perfect on the hard
  # reasoning bench at ~1/3 the Qwens' reasoning cost; 6.7GB = fast GPU swap.
  - name: local-qwen-small
    type: deepagents-model
    model: openai:Qwen3.5-4B-MTP-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 10  # Lemonade @ localhost:8010 is single-stream
    context_window: 16384
  # ── Ephemeral RunPod pods (defined in the ephemeral_pods: block at EOF) ──
  # base_url resolves to the live pod URL once the pod boots (env:SPINE_POD_URL__*).
  # Reasoner: Nemotron-3-Super-120B-A12B-NVFP4 (+MTP) on 4× RTX PRO 4500 Blackwell.
  - name: reasoner-pod
    type: deepagents-model
    model: openai:nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
    base_url: env:SPINE_POD_URL__REASONER
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 4
    context_window: 60000
  # Coder: Laguna-XS-2.1-FP8 + DFlash speculative decoding on 1× A40 (SGLang).
  - name: coder-pod
    type: deepagents-model
    model: openai:poolside/Laguna-XS-2.1-FP8
    base_url: env:SPINE_POD_URL__CODER
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 4
    context_window: 60000
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: Qwen3-Embedding-0.6B-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    stream_usage: true
    max_concurrent_calls: 10  # Lemonade @ localhost:8010 is single-stream
    query_prefix: 'search_query: '
    document_prefix: 'search_document: '
  reranker:
  - name: bge-reranker
    model: bge-reranker-v2-m3-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    max_concurrent_calls: 10  # Lemonade @ localhost:8010 is single-stream
    rerank_path: /reranking
  phases:
    # ═══ REASONING lane -> local-glm (open-ended judgment) ═══
    # Bench: reasoning models own plan-synthesis + critic; instruct can't. Moved
    # from gemma-12b to GLM-4.7-Flash (gemma planner kept scope-creeping and the
    # plan never converged, trace 019efc66). GLM does plan + critic = one model,
    # ZERO intra-phase swaps across the whole specify/plan/critic tree.
    # ═══ PLANNING lane -> reasoner-pod (Nemotron NVFP4, boots the RTX PRO 4500 pod) ═══
    specify:
      provider: reasoner-pod
    specify/subagents/researcher:
      provider: reasoner-pod
    specify/subagents/researcher/supervisor:
      provider: reasoner-pod
    plan:
      provider: reasoner-pod
    plan/subagents/researcher:
      provider: reasoner-pod
    plan/subagents/researcher/supervisor:
      provider: reasoner-pod
    critic:
      provider: reasoner-pod
    critic/specify:
      provider: reasoner-pod
    critic/plan:
      provider: reasoner-pod
    gap_plan:
      provider: reasoner-pod
    exploration/manager:
      provider: reasoner-pod
    # ═══ INSTRUCT lane -> local-mellum (structured + simple) ═══
    # Guided-decoding bench: instruct wins enrich/decompose/classify at ZERO
    # reasoning cost; reasoning models cap-blow these (fin=length) and emit empty
    # summaries. The whole IMPLEMENT tree (decomposer + N slice-implementer
    # workers + verify) is one model = ZERO intra-phase swaps in the heaviest phase.
    # EDITOR lane -> laguna (remote @ 10.50.1.51:8000): Mellum2-12B failed the
    # one-mode-per-call tool contract (019efc1a) and North-Mini-Code was too slow
    # on enrich (5-min ReadTimeouts, 019efc45). Try Laguna-XS.2 as the editor.
    # Decompose/enrich stays on local-mellum (its strength per the bench, and far
    # faster than North on structured output). Laguna and Mellum are on DIFFERENT
    # servers, so this cross-model split costs no model reload.
    # ═══ EXECUTION lane -> coder-pod (Laguna+DFlash, boots the A40 SGLang pod) ═══
    implement:
      provider: coder-pod
      # Escalation stays on coder-pod: an execution run only boots the coder
      # pod, so escalating to reasoner-pod (not booted) would fail to resolve.
      escalation:
        - provider: coder-pod
    # 'implement/decomposer' covers all decomposer modes (plan/fallback/per_file)
    # AND the enrich pass via prefix resolution.
    implement/decomposer:
      provider: coder-pod
    implement/subagents/slice-implementer:
      provider: coder-pod
    verify:
      provider: coder-pod
    verify/subagents/slice-verifier:
      provider: coder-pod
    classification:
      provider: local-qwen
      max_completion_tokens: 2048
      temperature: 0
      reasoning: false
    summarization:
      provider: local-qwen
      max_completion_tokens: 4096
      temperature: 0
      reasoning: false
    onboarding:
      provider: local-qwen
    onboarding/doc-manager:
      provider: local-qwen
    onboarding/section-worker:
      provider: local-qwen
    # Error-diagnosis model (one cheap line on `execute` failure). Routed to the
    # IMPLEMENT/VERIFY editor model so no model reload happens where shell calls
    # actually fail. error_diagnosis is enabled in the spine: block above.
    error_diagnosis:
      provider: local-qwen
      max_completion_tokens: 256
      temperature: 0
      reasoning: false

# ════════════════════════════════════════════════════════════════════════════
# Ephemeral GPU pods (spine.infra.ephemeral_pod). A planning run boots ONLY the
# reasoner pod; an execution run boots ONLY the coder pod (phase-scoped: the two
# lanes are separate runs with the human-approval gate between them). Utility
# phases (classification/summarization/onboarding/error_diagnosis) stay on
# local-qwen so they never depend on whichever pod is booted.
#
# Requires: RUNPOD_API_KEY and HF_TOKEN in .env; `uv pip install runpod`.
#
# ⚠ UNVERIFIED — validate with a boot test before trusting a real run:
#   [reasoner] NVFP4 on RTX PRO 4500 (workstation Blackwell sm_120): native
#     NVFP4 kernels target datacenter Blackwell (B200/sm_100); VLLM_NVFP4_GEMM_
#     BACKEND=marlin is the portable hedge. Also the MTP --speculative_config
#     JSON quoting through RunPod docker_args, and image v0.20.0 compatibility.
#   [coder] SGLang image entrypoint (does docker_args need the `python3 -m
#     sglang.launch_server` prefix, or does the image prepend it?), DFlash
#     support status in the image, and FP8-KV correctness on the A40 (Ampere).
# ════════════════════════════════════════════════════════════════════════════
ephemeral_pods:
  # ── Reasoner: Nemotron-3-Super-120B-A12B-NVFP4 (+MTP) — 4× RTX PRO 4500 ──
  - name: reasoner
    enabled: true
    engine: vllm
    binds_provider: reasoner-pod          # → --model nvidia/...Nemotron...NVFP4
    phases: [specify, plan, critic, gap_plan]   # boot gate: the planning lane
    gpu_type_id: "NVIDIA RTX PRO 4500 Blackwell"
    gpu_count: 4                          # 128GB total, TP=4; weights ~80.3GB
    cloud_type: SECURE
    image: "vllm/vllm-openai:v0.20.0"     # NVFP4 requires this version per NVIDIA
    container_disk_gb: 40
    volume_gb: 120                        # persist the ~80GB checkpoint across runs
    startup_timeout_s: 1200               # first-boot download+load of 80GB is slow
    max_lifetime_s: 5400
    on_failure: abort
    env:
      VLLM_NVFP4_GEMM_BACKEND: marlin     # portable FP4 path for non-sm_100 Blackwell
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    # --model / --tensor-parallel-size / --host / --port are auto-prepended.
    # reasoning-parser dropped (needs a plugin file the stock image lacks;
    # reasoning stays inline in content, which spine tolerates).
    #
    # MTP DROPPED: the runpod SDK interpolates docker_args into its GraphQL
    # mutation UNESCAPED, so the --speculative_config {"method":"mtp",...} JSON
    # (quotes/braces/colons) breaks create_pod with a GraphQL syntax error
    # (confirmed 2026-07-06). MTP needs a RunPod template or a mounted config
    # file, not inline JSON in docker_args — tracked as a follow-up. The model
    # runs fine without MTP (it's a decode-throughput optimization, not required).
    vllm_args: >-
      --async-scheduling --trust-remote-code --max-model-len 65536
      --kv-cache-dtype fp8 --gpu-memory-utilization 0.9 --enable-chunked-prefill
      --mamba-ssm-cache-dtype float16 --enable-auto-tool-choice
      --tool-call-parser qwen3_coder

  # ── Coder: Laguna-XS-2.1-FP8 + DFlash speculative decoding — 1× A40 (SGLang) ──
  - name: coder
    enabled: true
    engine: "vllm/vllm-openai:latest"
    binds_provider: coder-pod             # → --model-path poolside/Laguna-XS-2.1-FP8
    phases: [implement, verify]           # boot gate: the execution lane
    gpu_type_id: "NVIDIA A40"
    gpu_count: 1
    cloud_type: SECURE
    container_disk_gb: 40
    volume_gb: 60
    startup_timeout_s: 900
    max_lifetime_s: 7200
    on_failure: abort
    speculative_algorithm: DFLASH         # → --speculative-algorithm DFLASH
    draft_model: poolside/Laguna-XS-2.1-DFlash  # → --speculative-draft-model-path
    # --model-path / --tp / --host / --port are auto-prepended.
    env:
      VLLM_BLOCKSCALE_FP8_GEMM_FLASHINFER: 0
    vllm_args: >-
      --kv-cache-dtype fp8_e5m2 --mem-fraction-static 0.9 --trust-remote-code
