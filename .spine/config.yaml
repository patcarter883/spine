spine:
  checkpoint_path: .spine/spine.db
  interpreter_enabled: true
  guided_decoding: true
  # Vector store configuration for Two-Pass Hybrid RAG
  embedding_model: openai:text-embedding-3-large
  vector_indexing:
    max_concurrent_chunks: 5
    batch_size: 10
    summarize_temperature: 0.3
    embed_temperature: 0.1
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
    env:
      PROJECT_ROOT: /home/pat/Projects/spine
providers:
  llm:
  - name: glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
    guided_decoding: true
  - name: owl-alpha
    type: deepagents-model
    model: openrouter:openrouter/owl-alpha
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-flash
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-flash
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-pro
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-pro
    enabled: true
    guided_decoding: true

  - name: laguna-m1
    type: deepagents-model
    model: openrouter:poolside/laguna-m.1:free
    enabled: true
    guided_decoding: true

  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:poolside/laguna-xs.2:free
    enabled: true
    guided_decoding: true

  - name: gemini-3.5-flash
    type: deepagents-model
    model: openrouter:google/gemini-3.5-flash
    enabled: true
    guided_decoding: true

  - name: local
    type: deepagents-model
    model: openai:model
    base_url: http://localhost:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
  - name: pat
    type: deepagents-model
    model: openai:model
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
  phases:
    specify:
      provider: deepseek-v4-flash
    plan:
      provider: local
    critic:
      provider: deepseek-v4-pro
    exploration:
      provider: local
    implement:
      provider: local
    implement/subagents/slice-implementer:
      provider: local
    verify:
      provider: deepseek-v4-pro
    gap_plan:
      provider: local
    # RAG phase providers
    classification:
      provider: deepseek-v4-flash
    embedding:
      provider: local
