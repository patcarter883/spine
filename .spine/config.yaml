spine:
  checkpoint_path: .spine/spine.db
  guided_decoding: true
  # ── smallcode-inspired small-model adaptations ────────────────────────
  # Recover tool calls a local model emits as text (<tool_call>…</tool_call>,
  # fenced JSON, bare object) instead of native tool_calls. Deterministic.
  tool_call_normalize: true
  # Append a one-line LLM fix hint to failed `execute` results. Routed to a
  # cheap local model via phases.error_diagnosis below (no remote calls).
  error_diagnosis: true
  # Per-model behavioural defaults, applied UNDER explicit provider/phase
  # settings (provider/phase values always win). context_window here is a
  # backstop for any provider that omits it; tool_format documents the call
  # style the normalizer should expect for these Hermes-template GGUFs.
  model_profiles:
    openai:Qwen3-Coder-30B-A3B-Instruct-GGUF:
      tool_format: hermes
      context_window: 60000
    openai:GLM-4.7-Flash-GGUF:
      tool_format: hermes
      context_window: 60000
  topic_lookup_min_similarity: 0.75
  synthesize_findings_token_budget: 20000
  max_completion_tokens: 30000
  researcher_supervisor_max_completion_tokens: 4096
  # 3->5: GLM planner converges but addresses critic feedback incrementally —
  # trace 019efcc1 was one retry short of PASS (attempt 3: "covers the majority,
  # one gap left"). Give it room to finish converging.
  max_critic_retries: 5
  reranker_provider: bge-reranker
  embedding_provider: local-embeddings
  recall_k: 10
  topic_lookup_top_k: 5
  index_tests: false
  # ── Last round of work: all features enabled ──────────────────────────
  # No-tool IMPLEMENT editor: synthesize complete edits, place them
  # deterministically via ReadEditLintTool (lint = oracle). Routes pending
  # slices to synthesis_implementer instead of the tool-using slice_implementer.
  # variants=3: synthesize 3 candidates, keep the one that applies+lints cleanest.
  implement_synthesis_placement: true
  implement_synthesis_variants: 1
  # PLAN best-of-N (Graph-of-Thoughts Score+KeepBest): synthesize 3 candidate
  # plans, score each with the structural scorer (rejects the duplicate-path
  # explosion / unschedulable plans), keep the best before the critic sees it.
  research_synth_variants: 3
  research_synth_scorer: structural
  # Findings aggregation: consolidate findings before synthesis to shrink the
  # synthesizer prompt (mitigates read-spiral / context blowup).
  research_aggregate_merge: true
  research_aggregate_min_findings: 8
  # Lifted PLAN-synthesis completion cap (8K->16K) so larger plans don't
  # truncate the forced write_structured_plan call mid-arguments.
  plan_synthesize_max_completion_tokens: 16384
  rrf_vector_weight: 0.2
  rrf_bm25_weight: 1.0
  vector_indexing:
    max_concurrent_chunks: 2
    batch_size: 100
  convergence:
    researcher_supervisor_max_cycles_specify: 12
    researcher_supervisor_max_cycles_plan: 6
  token_compaction:
    enabled: true
    default_threshold: 0
    thresholds:
      specify: 30000
      plan: 30000
      implement: 30000
      verify: 30000
    keep_recent: 6
    preserved_tools:
    - write_file
    - edit_file
    - read_edit_lint
    - write_specification
    - write_plan
    - write_tasks
    - write_verification_report
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
providers:
  llm:
  - name: openrouter-glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.2
    enabled: true
  # - name: pat
  #   type: deepagents-model
  #   model: openai:model
  #   base_url: http://10.50.1.51:8100/v1
  #   api_key: vllm
  #   guided_decoding: true
  #   enabled: true
  #   stream_usage: true
  #   max_concurrent_calls: 2
  #   context_window: 32000
  - name: local-glm
    type: deepagents-model
    model: openai:GLM-4.7-Flash-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: local-qwen
    type: deepagents-model
    model: openai:Qwen3.6-35B-A3B-MTP-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
    # Qwen-Coder model-card sampling: curbs the repeated-survey / re-read loops
    # a tool-using agent falls into (trace 019ef2ae: one file read 89×).
    # repeat_penalty is the key anti-loop lever (llama.cpp's native name —
    # confirmed accepted by this server; vLLM's "repetition_penalty" is also
    # supported by _build_local_model for portability). top_k/repeat_penalty
    # ride extra_body to the server (no ChatOpenAI field); top_p/temperature
    # are native — see _build_local_model.
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  - name: local-north-code
    type: deepagents-model
    model: openai:North-Mini-Code-1.0-GGUF-UD-Q4_K_XL
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: local-qwen-coder
    type: deepagents-model
    model: openai:Qwen3-Coder-30B-A3B-Instruct-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
    # Anti-loop sampling (matches the local code models for fair comparison).
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  - name: local-mellum
    type: deepagents-model
    model: openai:Mellum2-12B-A2.5B-Instruct-GGUF-Q4_K_M-Q4_K_M
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  - name: laguna
    type: deepagents-model
    model: openai:/root/.cache/huggingface/Laguna-XS.2-RXF
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
    # Anti-loop sampling (matches the local code models for fair comparison).
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  # Reasoning lane (PLAN synthesis, critic): bench winner — perfect on the hard
  # reasoning bench at ~1/3 the Qwens' reasoning cost; 6.7GB = fast GPU swap.
  - name: local-gemma-12b
    type: deepagents-model
    model: openai:gemma-4-12B-it-qat-q4_0-gguf-Q4_0
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    context_window: 60000
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: Qwen3-Embedding-0.6B-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    stream_usage: true
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    query_prefix: 'search_query: '
    document_prefix: 'search_document: '
  reranker:
  - name: bge-reranker
    model: bge-reranker-v2-m3-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    max_concurrent_calls: 1  # Lemonade @ localhost:8010 is single-stream
    rerank_path: /reranking
  phases:
    # ═══ REASONING lane -> local-glm (open-ended judgment) ═══
    # Bench: reasoning models own plan-synthesis + critic; instruct can't. Moved
    # from gemma-12b to GLM-4.7-Flash (gemma planner kept scope-creeping and the
    # plan never converged, trace 019efc66). GLM does plan + critic = one model,
    # ZERO intra-phase swaps across the whole specify/plan/critic tree.
    specify:
      provider: local-glm
    specify/subagents/researcher:
      provider: local-glm
    specify/subagents/researcher/supervisor:
      provider: local-glm
    plan:
      provider: local-glm
    plan/subagents/researcher:
      provider: local-glm
    plan/subagents/researcher/supervisor:
      provider: local-glm
    critic:
      provider: local-glm
    critic/specify:
      provider: local-glm
    critic/plan:
      provider: local-glm
    gap_plan:
      provider: local-glm
    exploration/manager:
      provider: local-glm
    # ═══ INSTRUCT lane -> local-mellum (structured + simple) ═══
    # Guided-decoding bench: instruct wins enrich/decompose/classify at ZERO
    # reasoning cost; reasoning models cap-blow these (fin=length) and emit empty
    # summaries. The whole IMPLEMENT tree (decomposer + N slice-implementer
    # workers + verify) is one model = ZERO intra-phase swaps in the heaviest phase.
    # EDITOR lane -> laguna (remote @ 10.50.1.51:8000): Mellum2-12B failed the
    # one-mode-per-call tool contract (019efc1a) and North-Mini-Code was too slow
    # on enrich (5-min ReadTimeouts, 019efc45). Try Laguna-XS.2 as the editor.
    # Decompose/enrich stays on local-mellum (its strength per the bench, and far
    # faster than North on structured output). Laguna and Mellum are on DIFFERENT
    # servers, so this cross-model split costs no model reload.
    implement:
      provider: local-qwen-coder
      # Failure-driven escalation (LOCAL — stays true to local-first). When a
      # slice survives a FALLBACK re-decomposition (_decompose_depth ≥ 1), the
      # editor escalates from the coder model to the reasoning model, which
      # tends to land edits the coder couldn't. Covers slice-implementer and
      # synthesis via prefix resolution. Reachable depth is bounded by
      # implement_max_decompose_depth (default 1), so only rung 1 fires today.
      escalation:
        - provider: local-glm
    # 'implement/decomposer' covers all decomposer modes (plan/fallback/per_file)
    # AND the enrich pass via prefix resolution.
    implement/decomposer:
      provider: local-qwen-coder
    implement/subagents/slice-implementer:
      provider: local-qwen-coder
    verify:
      provider: local-qwen-coder
    verify/subagents/slice-verifier:
      provider: local-qwen-coder
    classification:
      provider: local-qwen-coder
      max_completion_tokens: 2048
      temperature: 0
      reasoning: false
    summarization:
      provider: local-qwen-coder
      max_completion_tokens: 4096
      temperature: 0
      reasoning: false
    onboarding:
      provider: local-qwen-coder
    onboarding/doc-manager:
      provider: local-qwen-coder
    onboarding/section-worker:
      provider: local-qwen-coder
    # Error-diagnosis model (one cheap line on `execute` failure). Routed to the
    # IMPLEMENT/VERIFY editor model so no model reload happens where shell calls
    # actually fail. error_diagnosis is enabled in the spine: block above.
    error_diagnosis:
      provider: local-qwen-coder
      max_completion_tokens: 256
      temperature: 0
      reasoning: false
