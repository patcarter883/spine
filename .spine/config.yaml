spine:
  checkpoint_path: .spine/spine.db
  interpreter_enabled: true
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
    env:
      PROJECT_ROOT: /home/pat/Projects/spine
providers:
  llm:
  - name: glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
  - name: owl-alpha
    type: deepagents-model
    model: openrouter:openrouter/owl-alpha
    enabled: true
  - name: deepseek-v4-flash
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-flash
    enabled: true
  - name: deepseek-v4-pro
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-pro
    enabled: true
  - name: laguna-m1
    type: deepagents-model
    model: openrouter:poolside/laguna-m.1:free
    enabled: true
  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:poolside/laguna-xs.2:free
    enabled: true
  - name: gemini-3.5-flash
    type: deepagents-model
    model: openrouter:google/gemini-3.5-flash
    enabled: true
  - name: local
    type: deepagents-model
    model: openai:model
    base_url: http://localhost:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
  - name: pat
    type: deepagents-model
    model: openai:model
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
  phases:
    specify:
      provider: laguna-m1
    plan:
      provider: laguna-m1
    critic:
      provider: local
    exploration:
      provider: local
    implement:
      provider: local
    implement/subagents/slice-implementer:
      provider: local
      guided_decoding: true
    verify:
      provider: local
    gap_plan:
      provider: local
