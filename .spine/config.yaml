spine:
  checkpoint_path: .spine/spine.db
  interpreter_enabled: true

providers:
  llm:
  - name: frontier
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
  - name: lfm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
  - name: laguna-m1
    type: deepagents-model
    model: openrouter:qwen/qwen3.6-plus
    enabled: true
  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:qwen/qwen3-coder-next
    enabled: true
  - name: local
    type: deepagents-model
    model: openai:model
    base_url: 'http://localhost:8000/v1'
    api_key: 'vllm'
    enabled: true
  
  phases:
    # Heavy reasoning → frontier model (via reference)
    specify:
      provider: frontier
    plan:
      provider: lfm

    # Implementation → local vLLM, but colder temperature for code
    implement:
      provider: laguna-m1
      temperature: 0.3           # freezes just the temp override

    # Slice implementer subagent gets the same vLLM but even faster
    implement/subagents/slice-implementer:
      provider: laguna-xs2

    # Verification → local vLLM model with custom endpoint
    verify:
      provider: laguna-m1              # short timeout for verify