spine:
  checkpoint_path: .spine/spine.db
  guided_decoding: true
  topic_lookup_min_similarity: 0.75
  synthesize_findings_token_budget: 20000
  max_completion_tokens: 30000
  researcher_supervisor_max_completion_tokens: 4096
  max_critic_retries: 3
  reranker_provider: bge-reranker
  embedding_provider: local-embeddings
  recall_k: 10
  topic_lookup_top_k: 5
  index_tests: false
  rrf_vector_weight: 0.2
  rrf_bm25_weight: 1.0
  vector_indexing:
    max_concurrent_chunks: 2
    batch_size: 100
  convergence:
    researcher_supervisor_max_cycles_specify: 12
    researcher_supervisor_max_cycles_plan: 6
  token_compaction:
    enabled: true
    default_threshold: 0
    thresholds:
      specify: 30000
      plan: 30000
      implement: 30000
      verify: 30000
    keep_recent: 6
    preserved_tools:
    - write_file
    - edit_file
    - read_edit_lint
    - write_specification
    - write_plan
    - write_tasks
    - write_verification_report
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
providers:
  llm:
  # - name: openrouter
  #   type: deepagents-model
  #   model: openrouter:poolside/laguna-xs.2:free
  #   enabled: true
  #   guided_decoding: true
  - name: openrouter-glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.2
    enabled: true
  # - name: pat
  #   type: deepagents-model
  #   model: openai:model
  #   base_url: http://10.50.1.51:8100/v1
  #   api_key: vllm
  #   guided_decoding: true
  #   enabled: true
  #   stream_usage: true
  #   max_concurrent_calls: 2
  #   context_window: 32000

  - name: local-nex
    type: deepagents-model
    model: openai:nex-agi_Nex-N2-mini-GGUF-Q4_K_M
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  - name: local-nex-iq4xs
    type: deepagents-model
    model: openai:nex-agi_Nex-N2-mini-GGUF-IQ4_XS
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  - name: local-gemma
    type: deepagents-model
    model: openai:gemma-4-26B-A4B-it-qat-q4_0-gguf-Q4_0
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  - name: local-qwen
    type: deepagents-model
    model: openai:Qwen3.6-27B-MTP-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
    # Qwen-Coder model-card sampling: curbs the repeated-survey / re-read loops
    # a tool-using agent falls into (trace 019ef2ae: one file read 89×).
    # repeat_penalty is the key anti-loop lever (llama.cpp's native name —
    # confirmed accepted by this server; vLLM's "repetition_penalty" is also
    # supported by _build_local_model for portability). top_k/repeat_penalty
    # ride extra_body to the server (no ChatOpenAI field); top_p/temperature
    # are native — see _build_local_model.
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
  - name: local-north-code
    type: deepagents-model
    model: openai:North-Mini-Code-1.0-GGUF-UD-Q4_K_XL
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  - name: local-mellum
    type: deepagents-model
    model: openai:Mellum2-12B-A2.5B-Thinking-GGUF-Q4_K_M
    base_url: http://localhost:8010/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
    context_window: 60000
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: Qwen3-Embedding-0.6B-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    stream_usage: true
    query_prefix: 'search_query: '
    document_prefix: 'search_document: '
  reranker:
  - name: bge-reranker
    model: bge-reranker-v2-m3-GGUF
    base_url: http://localhost:8010/v1
    api_key: vllm
    rerank_path: /reranking
  phases:
    specify:
      provider: local-north-code
      # Declare the model's real context window so the synthesizer runs under
      # the window-aware budget ledger (synthesis_budget): it clamps the synth
      # completion to synthesize_max_completion_tokens and compresses evidence
      # if it ever exceeds the window. Without this the synth runs "legacy"
      # (no clamp, fixed evidence budgets). poolside/laguna-xs.2 = 262144.
      context_window: 60000
    specify/subagents/researcher:
      provider: local-north-code
    specify/subagents/researcher/supervisor:
      provider: local-north-code
    plan:
      provider: local-north-code
      context_window: 60000
    plan/subagents/researcher:
      provider: local-north-code
    plan/subagents/researcher/supervisor:
      provider: local-north-code
    implement:
      provider: local-north-code
    # The decomposer (structured slice/micro-slice JSON) and the slice
    # implementer (exact-match read_edit_lint) are where a weak local model
    # burns the most tokens — failed edits and length-capped decompositions
    # cascade into fallback re-decomposition (trace 019ed3dc). These two keys
    # let you route just those roles to a stronger endpoint without moving the
    # rest of IMPLEMENT. The 'implement/decomposer' key covers all three
    # decomposer modes (plan/fallback/per_file) via prefix resolution. To flip:
    # enable a stronger provider in providers.llm[] (e.g. 'pat' or
    # 'openrouter') and change 'provider: local' below to its name.
    implement/decomposer:
      provider: local-north-code
    implement/subagents/slice-implementer:
      provider: local-north-code
    verify:
      provider: local-north-code
    verify/subagents/slice-verifier:
      provider: local-north-code
    critic:
      provider: local-north-code
    critic/specify:
      provider: local-north-code
    critic/plan:
      provider: local-north-code
    gap_plan:
      provider: local-north-code
    exploration/manager:
      provider: local-north-code
    classification:
      provider: local-north-code
      max_completion_tokens: 2048
      temperature: 0
      reasoning: false
    summarization:
      provider: local-north-code
      max_completion_tokens: 4096
      temperature: 0
      reasoning: false
    onboarding:
      provider: local-north-code
    onboarding/doc-manager:
      provider: local-north-code
    onboarding/section-worker:
      provider: local-north-code
