spine:
  checkpoint_path: .spine/spine.db
  guided_decoding: true
  topic_lookup_min_similarity: 0.75
  synthesize_findings_token_budget: 20000
  max_completion_tokens: 30000
  researcher_supervisor_max_completion_tokens: 4096
  max_critic_retries: 3
  reranker_provider: bge-reranker
  embedding_provider: local-embeddings
  recall_k: 10
  topic_lookup_top_k: 5
  index_tests: false
  rrf_vector_weight: 0.2
  rrf_bm25_weight: 1.0
  vector_indexing:
    max_concurrent_chunks: 10
    batch_size: 100
  convergence:
    researcher_supervisor_max_cycles_specify: 12
    researcher_supervisor_max_cycles_plan: 6
  token_compaction:
    enabled: true
    default_threshold: 0
    thresholds:
      specify: 30000
      plan: 30000
      implement: 30000
      verify: 30000
    keep_recent: 6
    preserved_tools:
    - write_file
    - edit_file
    - read_edit_lint
    - write_specification
    - write_plan
    - write_tasks
    - write_verification_report
mcp_servers:
  codebase-index:
    transport: stdio
    command: mcp-codebase-index
    args: []
providers:
  llm:
  - name: glm
    type: deepagents-model
    model: openrouter:z-ai/glm-5.1
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-flash
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-flash
    enabled: true
    guided_decoding: true
  - name: deepseek-v4-pro
    type: deepagents-model
    model: openrouter:deepseek/deepseek-v4-pro
    enabled: true
    guided_decoding: false
  - name: laguna-m1
    type: deepagents-model
    model: openrouter:poolside/laguna-m.1:free
    enabled: true
    guided_decoding: true
  - name: laguna-xs2
    type: deepagents-model
    model: openrouter:poolside/laguna-xs.2:free
    enabled: true
    guided_decoding: true
  - name: gemini-3.5-flash
    type: deepagents-model
    model: openrouter:google/gemini-3.5-flash
    enabled: true
    guided_decoding: true
  - name: local
    type: deepagents-model
    model: openai:gemma-4-26B-A4B-it-qat-q4_0-gguf-Q4_0
    base_url: http://localhost:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 2
  - name: pat
    type: deepagents-model
    model: openai:model
    base_url: http://10.50.1.51:8000/v1
    api_key: vllm
    guided_decoding: true
    enabled: true
    stream_usage: true
    max_concurrent_calls: 8
  - name: local-tiny
    type: deepagents-model
    model: openai:Gemma-4-E4B-it-GGUF
    base_url: http://localhost:8000/v1
    api_key: vllm
    stream_usage: true
  embedding:
  - name: local-embeddings
    type: openai-embedding
    model: nomic-embed-text-v2-moe-GGUF
    base_url: http://localhost:8000/v1
    api_key: vllm
    stream_usage: true
    query_prefix: 'search_query: '
    document_prefix: 'search_document: '
  reranker:
  - name: bge-reranker
    model: bge-reranker-v2-m3-GGUF
    base_url: http://localhost:8000/v1
    api_key: vllm
    rerank_path: /reranking
  phases:
    specify:
      provider: local
    specify/subagents/researcher:
      provider: pat
    plan:
      provider: local
    plan/subagents/researcher:
      provider: pat
    implement:
      provider: pat
    verify:
      provider: local
    critic:
      provider: local
    gap_plan:
      provider: local
    classification:
      provider: pat
      max_completion_tokens: 1024
      temperature: 0
      reasoning: false
    summarization:
      provider: pat
      max_completion_tokens: 1024
      temperature: 0
      reasoning: false
    onboarding:
      provider: local
