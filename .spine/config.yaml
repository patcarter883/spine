spine:
  checkpoint_path: .spine/spine.db

providers:
  llm:
    - name: local-vllm
      type: deepagents-model
      config:
        model: "openai:model"
        base_url: "http://localhost:8000/v1"
        api_key: "dummy"
        temperature: 0.3
        max_tokens: 8192

  agent:
    - name: default
      type: opencode
      config:
        mode: acp
        model: openrouter/minimax/minimax-m2.7
        auto_approve: true
